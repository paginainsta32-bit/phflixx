<script>
        if (localStorage.getItem('phflix_autenticado') !== 'true') {
            window.location.href = '../login/index.html';
        }

        const NOME_USUARIO_GIT = window.location.hostname.split('.')[0];
        const URL_CSV_CONTEUDOS = `https://${NOME_USUARIO_GIT}.github.io/phflix/dados/conteudos.csv`;
        const URL_CSV_EPISODIOS = `https://${NOME_USUARIO_GIT}.github.io/phflix/dados/episodios.csv`;

        document.addEventListener("DOMContentLoaded", () => {
            const URL_PARAMS = new URLSearchParams(window.location.search);
            const NOME_MIDIA = decodeURIComponent(URL_PARAMS.get('nome'));
            const TIPO_MIDIA = URL_PARAMS.get('tipo');

            if (TIPO_MIDIA === 'filme') {
                carregarFilme(NOME_MIDIA);
            } else {
                carregarSerie(NOME_MIDIA);
            }
        });

        function carregarFilme(nome) {
            Papa.parse(URL_CSV_CONTEUDOS, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const filme = results.data.find(f => f.Nome === nome);
                    if (filme) {
                        document.getElementById("titulo-midia").innerText = filme.Nome;
                        document.getElementById("sinopse-midia").innerText = filme.Sinopse || "Sinopse não disponível para este filme.";
                        document.getElementById("badge-tipo").innerText = filme.Tipo;
                        document.getElementById("player-iframe").src = filme.Link;
                    }
                }
            });
        }

        function carregarSerie(nome) {
            document.getElementById("bloco-episodios").style.display = "block";

            Papa.parse(URL_CSV_CONTEUDOS, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const serie = results.data.find(s => s.Nome === nome);
                    if (serie) {
                        document.getElementById("titulo-midia").innerText = serie.Nome;
                        document.getElementById("sinopse-midia").innerText = serie.Sinopse || "Sinopse não disponível para esta série.";
                        document.getElementById("badge-tipo").innerText = serie.Tipo;
                    }
                }
            });

            Papa.parse(URL_CSV_EPISODIOS, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const listaFiltrada = results.data.filter(ep => ep.Nome === nome);
                    const container = document.getElementById("grade-episodios");
                    
                    document.getElementById("contador-ep").innerText = `${listaFiltrada.length} Episódios`;
                    container.innerHTML = "";

                    listaFiltrada.forEach(ep => {
                        if(!ep.Episódio) return;
                        const itemCard = `
                            <div class="p-3 bg-neutral-900 hover:bg-neutral-800 border border-zinc-800 rounded-xl cursor-pointer transition-colors flex items-center justify-between group" onclick="tocarVideo('${ep.Link}')">
                                <div>
                                    <h4 class="font-bold text-xs text-zinc-200 group-hover:text-[#e50914] transition-colors">Temporada ${ep.Temporada} • Ep ${ep.Episódio}</h4>
                                    <span class="text-[10px] text-zinc-500 block mt-0.5">Disponível em HD</span>
                                </div>
                                <span class="text-xs bg-zinc-800 text-zinc-400 font-bold px-2.5 py-1 rounded group-hover:bg-[#e50914] group-hover:text-white transition-all">PLAY</span>
                            </div>
                        `;
                        container.innerHTML += itemCard;
                    });

                    if(listaFiltrada.length > 0) {
                        tocarVideo(listaFiltrada[0].Link);
                    }
                }
            });
        }

        function tocarVideo(link) {
            document.getElementById("player-iframe").src = link;
        }
    </script>
