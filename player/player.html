<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PHFLIX - Player de Transmissão</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "background": "#131313", "primary": "#e50914" } } }
          }
    </script>
</head>
<body class="bg-[#131313] text-[#e5e2e1] font-['Inter']">

    <nav class="p-5 bg-black/40 backdrop-blur-xs flex items-center justify-between border-b border-zinc-900">
        <a href="../catalogo/index.html" class="text-sm font-semibold text-zinc-400 hover:text-white transition-colors flex items-center gap-1">
            ‹ Voltar ao Catálogo
        </a>
        <span class="text-2xl font-black text-[#e50914] tracking-wider">PHFLIX</span>
    </nav>

    <main class="max-w-5xl mx-auto p-6 space-y-6">
        <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-zinc-800 shadow-2xl">
            <iframe id="player-iframe" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="space-y-3 bg-neutral-900/40 p-6 rounded-xl border border-zinc-900">
            <div class="flex items-center gap-3">
                <h1 id="titulo-midia" class="text-3xl font-black text-white">Carregando...</h1>
                <span id="badge-tipo" class="text-[10px] bg-zinc-800 text-zinc-300 font-extrabold px-2.5 py-0.5 rounded border border-zinc-700 uppercase">---</span>
            </div>
            <p id="sinopse-midia" class="text-zinc-400 text-sm leading-relaxed">Carregando detalhes e sinopse...</p>
        </div>

        <section id="bloco-episodios" class="space-y-4 pt-4" style="display: none;">
            <h2 class="text-xl font-bold border-l-4 border-[#e50914] pl-3">Lista de Episódios</h2>
            <div id="grade-episodios" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script>
        if (localStorage.getItem('phflix_autenticado') !== 'true') {
            window.location.href = '../login/index.html';
        }

        document.addEventListener("DOMContentLoaded", () => {
            const URL_PARAMS = new URLSearchParams(window.location.search);
            const NOME_MIDIA = decodeURIComponent(URL_PARAMS.get('nome'));
            const TIPO_MIDIA = URL_PARAMS.get('tipo');

            if (TIPO_MIDIA === 'filme') {
                carregarFilme(NOME_MIDIA);
            } else {
                carregarSerie(NOME_MIDIA);
            }
        });

        function carregarFilme(nome) {
            Papa.parse("../dados/conteudos.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const filme = results.data.find(f => f.Nome === nome);
                    if (filme) {
                        document.getElementById("titulo-midia").innerText = filme.Nome;
                        document.getElementById("sinopse-midia").innerText = filme.Sinopse || "Sinopse não disponível para este filme.";
                        document.getElementById("badge-tipo").innerText = filme.Tipo;
                        document.getElementById("player-iframe").src = filme.Link;
                    }
                }
            });
        }

        function carregarSerie(nome) {
            document.getElementById("bloco-episodios").style.display = "block";

            Papa.parse("../dados/conteudos.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const serie = results.data.find(s => s.Nome === nome);
                    if (serie) {
                        document.getElementById("titulo-midia").innerText = serie.Nome;
                        document.getElementById("sinopse-midia").innerText = serie.Sinopse || "Sinopse não disponível para esta série.";
                        document.getElementById("badge-tipo").innerText = serie.Tipo;
                    }
                }
            });

            // Filtra os episódios batendo a coluna Nome do CSV de Episódios com o Nome da Série
            Papa.parse("../dados/episodios.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const todosEpisodios = results.data;
                    const listaFiltrada = todosEpisodios.filter(ep => ep.Nome === nome);
                    
                    const container = document.getElementById("grade-episodios");
                    container.innerHTML = "";

                    listaFiltrada.forEach(ep => {
                        if(!ep.Episódio) return;
                        
                        const itemCard = `
                            <div class="flex flex-col p-3 bg-neutral-950/60 hover:bg-neutral-900 border border-zinc-900 rounded-lg cursor-pointer transition-all group" onclick="tocarVideo('${ep.Link}')">
                                <div class="w-full aspect-video rounded bg-zinc-900 overflow-hidden mb-2 relative flex items-center justify-center border border-zinc-800">
                                    <div class="absolute inset-0 bg-black/40 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                                        <span class="text-xs font-bold text-white bg-red-600 px-2 py-1 rounded">PLAY EPISÓDIO ${ep.Episódio}</span>
                                    </div>
                                </div>
                                <h4 class="font-bold text-xs text-zinc-200 truncate">Temporada ${ep.Temporada} - Episódio ${ep.Episódio}</h4>
                            </div>
                        `;
                        container.innerHTML += itemCard;
                    });

                    if(listaFiltrada.length > 0) {
                        tocarVideo(listaFiltrada[0].Link);
                    }
                }
            });
        }

        function tocarVideo(link) {
            document.getElementById("player-iframe").src = link;
        }
    </script>
</body>
</html>
