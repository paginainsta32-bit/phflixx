<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PHFLIX Player</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
font-family:Inter;
width:100vw;
height:100vh;
}

/* VIDEO */

video{
width:100vw;
height:100vh;
object-fit:contain;
background:black;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:linear-gradient(to bottom,
rgba(0,0,0,.85),
transparent);
z-index:9999;
pointer-events:none;
}

/* LOGO */

.logo{
position:fixed;
top:20px;
right:25px;
z-index:99999;
font-size:18px;
font-weight:900;
color:#e50914;
letter-spacing:1px;
text-shadow:0 0 10px black;
}

/* BACK */

.back{
position:fixed;
top:20px;
left:25px;
z-index:99999;
background:rgba(0,0,0,.6);
color:white;
padding:10px 18px;
border-radius:30px;
font-size:14px;
font-weight:700;
cursor:pointer;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);
transition:.2s;
}

.back:hover{
background:#e50914;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="logo">
PHFLIX
</div>

<div class="back"
onclick="history.back()">

← Voltar

</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

<script>

const params =
new URLSearchParams(window.location.search);

const url =
decodeURIComponent(
params.get("url") || ""
);

const video =
document.getElementById("video");

video.src = url;

video.play().catch(e=>{

console.log(e);

});

</script>

</body>

</html>
