<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PHFLIX Player</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:Inter;
width:100vw;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
linear-gradient(to top,
rgba(0,0,0,.95),
rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600');

background-size:cover;
background-position:center;
filter:blur(10px);
transform:scale(1.1);
}

/* CONTENT */

.content{
position:relative;
z-index:10;
text-align:center;
}

/* LOGO */

.logo{
font-size:70px;
font-weight:900;
color:#e50914;
letter-spacing:-2px;
margin-bottom:30px;
}

/* LOADER */

.loader{
width:70px;
height:70px;
border:5px solid rgba(255,255,255,.15);
border-top:5px solid #e50914;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

.text{
margin-top:25px;
font-size:18px;
font-weight:600;
color:#ccc;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="content">

<div class="logo">
PHFLIX
</div>

<div class="loader"></div>

<div class="text">
Iniciando reprodução...
</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const url =
decodeURIComponent(
params.get("url") || ""
);

setTimeout(()=>{

window.location.href = url;

},2500);

</script>

</body>

</html>
