<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PHFLIX PLAYER</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
rel="stylesheet">

<style>

body{
    margin:0;
    background:#131313;
    overflow:hidden;
    font-family:Inter;
}

</style>

</head>

<body>

<iframe
id="player"
style="
width:100vw;
height:100vh;
border:none;
background:black;
"
allowfullscreen
allow="autoplay; encrypted-media">
</iframe>

<script>

const params =
new URLSearchParams(window.location.search);

const link =
decodeURIComponent(params.get("link") || "");

document.getElementById("player").src =
`/phflixx/proxyplayer.html?url=${encodeURIComponent(link)}`;

</script>

</body>

</html>
