<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PHFLIX PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
width:100vw;
height:100vh;
overflow:hidden;
font-family:Inter;
}

/* FUNDO */

.bg{
position:fixed;
inset:0;

background:
linear-gradient(to top,
rgba(0,0,0,.9),
rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600');

background-size:cover;
background-position:center;

filter:blur(8px);
transform:scale(1.1);
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.25);
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 25px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:9999;
}

/* VOLTAR */

.back{

background:rgba(0,0,0,.55);

padding:10px 18px;

border-radius:40px;

color:white;

font-size:14px;

font-weight:700;

cursor:pointer;

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.1);

transition:.2s;
}

.back:hover{
background:#e50914;
}

/* LOGO */

.logo{

font-size:18px;
font-weight:900;
color:#e50914;
letter-spacing:1px;

text-shadow:0 0 10px black;

}

/* PLAYER MESSAGE */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

/* LOADER */

.loader{
width:70px;
height:70px;
border-radius:50%;
border:5px solid rgba(255,255,255,.15);
border-top:5px solid #e50914;

animation:spin 1s linear infinite;

margin:auto;
}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

.text{

margin-top:25px;
font-size:18px;
font-weight:600;
color:#ddd;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="overlay"></div>

<div class="topbar">

<div class="back"
onclick="history.back()">

← Voltar

</div>

<div class="logo">

PHFLIX

</div>

</div>

<div class="center">

<div class="loader"></div>

<div class="text">

Iniciando reprodução...

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const url =
decodeURIComponent(
params.get("url") || ""
);

// ABRIR VIDEO DIRETO

setTimeout(()=>{

window.open(url,"_self");

},1500);

</script>

</body>

</html>
