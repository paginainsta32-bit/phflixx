<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PHFLIX PLAYER</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
rel="stylesheet">

<style>

body{
    font-family:Inter;
    background:#131313;
    color:white;
}

video::-webkit-media-controls{
    filter:invert(0);
}

</style>

</head>

<body>

<header class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md z-50 border-b border-zinc-900">

<div class="flex items-center justify-between px-8 py-4">

<a href="/phflixx/catalogo/index.html"
class="text-zinc-300 hover:text-white">

← Voltar

</a>

<h1 class="text-3xl font-black text-red-600">
PHFLIX
</h1>

</div>

</header>

<main class="pt-24 px-6 pb-10">

<div class="max-w-7xl mx-auto">

<div class="aspect-video bg-black rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl">

<video
id="player"
class="w-full h-full"
controls
autoplay
playsinline>

<source id="source" src="" type="video/mp4">

</video>

</div>

</div>

</main>

<script>

const params =
new URLSearchParams(window.location.search);

const link =
decodeURIComponent(params.get("link") || "");

console.log(link);

document.getElementById("source").src =
link;

document.getElementById("player").load();

</script>

</body>
</html>
