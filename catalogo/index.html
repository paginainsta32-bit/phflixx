<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PHFLIX - Filmes e Séries</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "background": "#131313",
              "surface-container": "#201f1f",
              "primary-container": "#e50914",
              "on-background": "#e5e2e1",
              "secondary": "#c8c6c5",
              "primary": "#ffb4aa"
            }
          }
        }
      }
    </script>
</head>
<body class="bg-[#131313] text-[#e5e2e1] font-['Inter'] overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-gradient-to-b from-black/90 to-transparent px-12 py-5 flex justify-between items-center backdrop-blur-xs">
        <span class="text-3xl font-black text-[#e50914] tracking-tighter">PHFLIX</span>
        <button onclick="logout()" class="text-xs bg-[#353534] text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors font-bold tracking-wide">Sair</button>
    </nav>

    <header id="hero-bg" class="relative h-[80vh] w-full bg-cover bg-center flex items-center px-12 transition-all duration-500" style="background-image: linear-gradient(to top, #131313 12%, transparent 88%), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1600');">
        <div class="max-w-2xl space-y-4 relative z-10 pt-24">
            <h1 id="hero-titulo" class="text-5xl font-black md:text-6xl text-white drop-shadow-xl tracking-tight">Carregando Destaque...</h1>
            <p id="hero-descricao" class="text-sm md:text-base text-gray-300 line-clamp-3 drop-shadow-md leading-relaxed">Conectando aos servidores seguros do banco de dados do site...</p>
            <div class="pt-2">
                <a id="hero-link" href="#" class="bg-[#e50914] text-white px-8 py-3 rounded-lg font-bold text-base hover:bg-red-700 transition-colors inline-block shadow-2xl">Assistir Agora</a>
            </div>
        </div>
        <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-transparent"></div>
    </header>

    <main class="px-12 py-8 space-y-12 relative -mt-16 z-20">
        
        <section class="space-y-4">
            <h2 class="text-2xl font-bold tracking-tight border-l-4 border-[#e50914] pl-3 text-white">Filmes</h2>
            <div id="container-filmes" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                </div>
        </section>

        <section class="space-y-4 pt-4">
            <h2 class="text-2xl font-bold tracking-tight border-l-4 border-[#e50914] pl-3 text-white">Séries</h2>
            <div id="container-series" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                </div>
        </section>
    </main>

    <footer class="border-t border-zinc-800 py-12 bg-background text-center text-xs text-gray-500">
        <div class="text-2xl font-black text-[#e50914] mb-2 tracking-tighter">PHFLIX</div>
        <p>© 2026 PHFLIX Entertainment.</p>
    </footer>

    <script>
        if (localStorage.getItem('phflix_autenticado') !== 'true') {
            window.location.href = '../login/index.html';
        }

        const TABELA_BANNERS_URL = "https://api.baserow.io/api/database/rows/table/982353/?user_field_names=true";
        const TOKEN = "21WDS4cSz6izrJsEfUzRblsIdtj9DCF5";

        document.addEventListener("DOMContentLoaded", () => {
            carregarBannerDestaque();
            carregarGridDeFilmesESeries();
        });

        async function carregarBannerDestaque() {
            try {
                const response = await fetch(TABELA_BANNERS_URL, {
                    headers: { "Authorization": `Token ${TOKEN}` }
                });
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    const banner = data.results[0];
                    document.getElementById('hero-titulo').innerText = banner.titulo;
                    document.getElementById('hero-descricao').innerText = banner['descrição'];
                    document.getElementById('hero-bg').style.backgroundImage = `linear-gradient(to top, #131313 12%, transparent 88%), url('${banner.Imagem}')`;
                    document.getElementById('hero-link').href = banner.Link;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Lê o arquivo conteudos.csv mapeando exatamente pelas colunas lidas de dentro dele
        function carregarGridDeFilmesESeries() {
            Papa.parse("../dados/conteudos.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const lista = results.data;
                    const containerFilmes = document.getElementById("container-filmes");
                    const containerSeries = document.getElementById("container-series");
                    
                    containerFilmes.innerHTML = "";
                    containerSeries.innerHTML = "";

                    lista.forEach(item => {
                        if (!item.Nome || !item.Capa || !item.Tipo) return;
                        
                        const card = `
                            <div class="group cursor-pointer relative" onclick="abrirMidia('${encodeURIComponent(item.Nome)}', '${item.Tipo.toLowerCase()}')">
                                <div class="aspect-[2/3] w-full overflow-hidden rounded-xl bg-surface-container mb-3 relative border border-zinc-800 shadow-md">
                                    <img src="${item.Capa}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="${item.Nome}" loading="lazy">
                                    <div class="absolute top-2 right-2 bg-gradient-to-r from-red-700 to-red-600 text-[9px] font-extrabold px-2 py-0.5 rounded-sm uppercase tracking-wider text-white shadow-sm">${item.Idioma || 'DUB'}</div>
                                </div>
                                <div class="space-y-0.5">
                                    <h3 class="font-semibold text-sm text-zinc-200 truncate group-hover:text-[#e50914] transition-colors">${item.Nome}</h3>
                                    <span class="text-xs text-zinc-500 block">${item.Categoria || ''}</span>
                                </div>
                            </div>
                        `;

                        if (item.Tipo.toLowerCase() === 'filme') {
                            containerFilmes.innerHTML += card;
                        } else if (item.Tipo.toLowerCase() === 'série' || item.Tipo.toLowerCase() === 'serie') {
                            containerSeries.innerHTML += card;
                        }
                    });
                }
            });
        }

        function abrirMidia(nome, tipo) {
            window.location.href = `../player/index.html?nome=${nome}&tipo=${tipo}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../login/index.html';
        }
    </script>
</body>
</html>
