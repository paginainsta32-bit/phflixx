<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PHFLIX - Catálogo Premium</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "background": "#131313",
              "surface-container": "#201f1f",
              "surface-container-high": "#2a2a2a",
              "primary-container": "#e50914",
              "primary": "#ffb4aa",
              "secondary": "#c8c6c5",
              "on-background": "#e5e2e1",
              "on-surface": "#e5e2e1",
              "outline-variant": "#5e3f3b"
            },
            "spacing": {
              "margin-desktop": "60px",
              "base": "8px",
              "section-gap": "48px",
              "gutter": "16px"
            }
          }
        }
      }
    </script>
    <style>
        /* Remove a barra de rolagem visual mantendo o deslize funcionando */
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#131313] text-[#e5e2e1] font-['Inter'] overflow-x-hidden">

    <header class="fixed top-0 sticky z-50 bg-[#131313]/80 backdrop-blur-md flex justify-between items-center w-full px-margin-desktop py-4 border-b border-zinc-900/50">
        <div class="flex items-center gap-12">
            <h1 class="text-2xl font-black tracking-tighter text-[#e50914]">PHFLIX</h1>
            <nav class="hidden md:flex items-center space-x-6">
                <a class="text-white font-bold border-b-2 border-[#e50914] pb-1 text-sm" href="#">Home</a>
                <a class="text-secondary hover:text-white text-sm transition-colors" href="#titulo-filmes">Movies</a>
                <a class="text-secondary hover:text-white text-sm transition-colors" href="#titulo-series">Series</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <span id="user-display" class="text-xs text-secondary font-medium hidden md:inline"></span>
            <button onclick="logout()" class="text-xs bg-surface-container-high px-4 py-2 rounded-lg border border-outline-variant hover:border-primary-container transition-colors font-bold">Sair</button>
        </div>
    </header>

    <header id="hero-bg" class="relative h-[80vh] w-full bg-cover bg-center flex items-center px-margin-desktop transition-all duration-500" style="background-image: linear-gradient(to top, #131313 10%, transparent 90%), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1600');">
        <div class="max-w-2xl space-y-4 relative z-10 pt-16">
            <h1 id="hero-titulo" class="text-4xl font-black md:text-6xl text-white tracking-tight drop-shadow-2xl">Carregando Destaque...</h1>
            <p id="hero-descricao" class="text-sm md:text-base text-secondary line-clamp-3 leading-relaxed drop-shadow-md">Conectando ao servidor seguro...</p>
            <div class="pt-2">
                <a id="hero-link" href="#" class="bg-[#e50914] text-white px-8 py-3 rounded-lg font-bold text-base hover:bg-red-700 transition-colors inline-flex items-center gap-2 shadow-2xl">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span> Assistir Agora
                </a>
            </div>
        </div>
        <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-transparent"></div>
    </header>

    <main class="px-margin-desktop py-8 space-y-12 relative -mt-16 z-20">
        
        <section class="space-y-4">
            <h2 id="titulo-filmes" class="text-2xl font-bold tracking-tight text-white border-l-4 border-[#e50914] pl-3">Filmes Disponíveis</h2>
            <div id="container-filmes" class="flex gap-6 overflow-x-auto pb-4 scrollbar-none scroll-smooth">
                <p class="text-sm text-zinc-500">Buscando lista de filmes...</p>
            </div>
        </section>

        <section class="space-y-4 pt-4">
            <h2 id="titulo-series" class="text-2xl font-bold tracking-tight text-white border-l-4 border-[#e50914] pl-3">Séries Completas</h2>
            <div id="container-series" class="flex gap-6 overflow-x-auto pb-4 scrollbar-none scroll-smooth">
                <p class="text-sm text-zinc-500">Buscando lista de séries...</p>
            </div>
        </section>
    </main>

    <footer class="border-t border-zinc-900 py-12 bg-[#131313] text-center text-xs text-gray-600">
        <span class="text-xl font-black text-[#e50914] tracking-tighter block mb-2">PHFLIX</span>
        <p>© 2026 PHFLIX Entertainment. Todos os direitos reservados.</p>
    </footer>

    <script>
        if (localStorage.getItem('phflix_autenticado') !== 'true') {
            window.location.href = '../login/index.html';
        } else {
            document.getElementById('user-display').innerText = `Olá, ${localStorage.getItem('phflix_usuario') || 'Usuário'}`;
        }

        const TABELA_BANNERS_URL = "https://api.baserow.io/api/database/rows/table/982353/?user_field_names=true";
        const TOKEN = "21WDS4cSz6izrJsEfUzRblsIdtj9DCF5";

        const NOME_USUARIO_GIT = window.location.hostname.split('.')[0];
        const URL_CSV_CONTEUDOS = `https://${NOME_USUARIO_GIT}.github.io/phflix/dados/conteudos.csv`;

        document.addEventListener("DOMContentLoaded", () => {
            carregarBannerDestaque();
            carregarGridDeFilmesESeries();
        });

        async function carregarBannerDestaque() {
            try {
                const response = await fetch(TABELA_BANNERS_URL, {
                    headers: { "Authorization": `Token ${TOKEN}` }
                });
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    const banner = data.results[0];
                    document.getElementById('hero-titulo').innerText = banner.titulo;
                    document.getElementById('hero-descricao').innerText = banner['descrição'];
                    document.getElementById('hero-bg').style.backgroundImage = `linear-gradient(to top, #131313 10%, transparent 90%), url('${banner.Imagem}')`;
                    document.getElementById('hero-link').href = banner.Link;
                }
            } catch (err) {
                console.error(err);
            }
        }

        function carregarGridDeFilmesESeries() {
            Papa.parse(URL_CSV_CONTEUDOS, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const lista = results.data;
                    const containerFilmes = document.getElementById("container-filmes");
                    const containerSeries = document.getElementById("container-series");
                    
                    containerFilmes.innerHTML = "";
                    containerSeries.innerHTML = "";

                    lista.forEach(item => {
                        if (!item.Nome || !item.Capa || !item.Tipo) return;
                        
                        // Layout estrutural vertical idêntico de cinema
                        const card = `
                            <div class="w-[180px] md:w-[200px] flex-none group cursor-pointer relative" onclick="abrirMidia('${encodeURIComponent(item.Nome)}', '${item.Tipo.trim().toLowerCase()}')">
                                <div class="aspect-[2/3] w-full overflow-hidden rounded-xl bg-surface-container mb-3 cinematic-shadow relative border border-zinc-800">
                                    <img src="${item.Capa}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="${item.Nome}" loading="lazy">
                                    <div class="absolute top-2 right-2 bg-[#e50914] text-white text-[9px] font-extrabold px-2 py-0.5 rounded-sm uppercase tracking-wider shadow-md">${item.Idioma || 'DUB'}</div>
                                </div>
                                <div class="space-y-1">
                                    <h3 class="font-bold text-sm text-on-surface truncate group-hover:text-[#e50914] transition-colors">${item.Nome}</h3>
                                    <span class="text-xs text-secondary block">${item.Categoria || ''}</span>
                                </div>
                            </div>
                        `;

                        // Correção cirúrgica: Tratando maiúsculas e acentos ("Filme", "Série", "Serie") vindos do seu arquivo
                        const tipoTratado = item.Tipo.trim().toLowerCase();
                        if (tipoTratado === 'filme') {
                            containerFilmes.innerHTML += card;
                        } else if (tipoTratado === 'série' || tipoTratado === 'serie') {
                            containerSeries.innerHTML += card;
                        }
                    });

                    // Caso a lista venha vazia por segurança de carregamento
                    if(containerFilmes.innerHTML === "") containerFilmes.innerHTML = '<p class="text-xs text-zinc-500">Nenhum filme listado.</p>';
                    if(containerSeries.innerHTML === "") containerSeries.innerHTML = '<p class="text-xs text-zinc-500">Nenhuma série listada.</p>';
                }
            });
        }

        function abrirMidia(nome, tipo) {
            window.location.href = `../player/index.html?nome=${nome}&tipo=${tipo}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../login/index.html';
        }
    </script>
</body>
</html>
