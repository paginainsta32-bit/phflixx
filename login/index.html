<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PHFLIX - Entrar</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "background": "#131313", "primary-container": "#e50914" } } }
          }
    </script>
</head>
<body class="bg-[#131313] text-[#e5e2e1] font-['Inter'] min-h-screen flex flex-col justify-between relative">
    
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1600')] bg-cover bg-center opacity-15 pointer-events-none z-0"></div>

    <header class="p-6 relative z-10">
        <span class="text-3xl font-black text-[#e50914] tracking-tight">PHFLIX</span>
    </header>

    <main class="flex justify-center items-center px-4 flex-1 relative z-10">
        <div class="w-full max-w-[450px] bg-black/80 p-12 md:p-16 rounded-xl border border-[#353534] shadow-2xl">
            <h1 class="text-3xl font-bold mb-7 text-white">Entrar</h1>
            <form id="loginForm" class="space-y-4" onsubmit="return false;">
                <div>
                    <input type="email" id="loginEmail" required class="w-full p-4 rounded bg-[#353534] border-none text-white focus:ring-2 focus:ring-[#e50914] placeholder-gray-400 text-sm" placeholder="Email cadastrado">
                </div>
                <div>
                    <input type="password" id="loginPassword" required class="w-full p-4 rounded bg-[#353534] border-none text-white focus:ring-2 focus:ring-[#e50914] placeholder-gray-400 text-sm" placeholder="Senha">
                </div>
                <button type="submit" class="w-full bg-[#e50914] py-4 rounded font-bold text-white hover:bg-[#b80710] transition-colors mt-4 text-base tracking-wide shadow-lg">Entrar</button>
            </form>
        </div>
    </main>

    <footer class="bg-black/90 p-6 border-t border-[#353534] text-center text-xs text-gray-500 relative z-10">
        © 2026 PHFLIX Entertainment. Todos os direitos reservados.
    </footer>

    <script>
        if (localStorage.getItem('phflix_autenticado') !== 'true') {
            window.location.href = '../login/index.html';
        }

        const TABELA_BANNERS_URL = "https://api.baserow.io/api/database/rows/table/982353/?user_field_names=true";
        const TOKEN = "21WDS4cSz6izrJsEfUzRblsIdtj9DCF5";

        // PEGANDO O SEU USUÁRIO DINAMICAMENTE PARA O CAMINHO ABSOLUTO
        const NOME_USUARIO_GIT = window.location.hostname.split('.')[0];
        const URL_CSV_CONTEUDOS = `https://${NOME_USUARIO_GIT}.github.io/phflix/dados/conteudos.csv`;

        document.addEventListener("DOMContentLoaded", () => {
            carregarBannerDestaque();
            carregarGridDeFilmesESeries();
        });

        async function carregarBannerDestaque() {
            try {
                const response = await fetch(TABELA_BANNERS_URL, {
                    headers: { "Authorization": `Token ${TOKEN}` }
                });
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    const banner = data.results[0];
                    document.getElementById('hero-titulo').innerText = banner.titulo;
                    document.getElementById('hero-descricao').innerText = banner['descrição'];
                    document.getElementById('hero-bg').style.backgroundImage = `linear-gradient(to top, #131313 12%, transparent 88%), url('${banner.Imagem}')`;
                    document.getElementById('hero-link').href = banner.Link;
                }
            } catch (err) {
                console.error(err);
            }
        }

        function carregarGridDeFilmesESeries() {
            // Usando a URL absoluta para o GitHub Pages não se perder nas pastas
            Papa.parse(URL_CSV_CONTEUDOS, {
                download: true,
                header: true,
                skipEmptyLines: true, // Ignora linhas em branco do final do arquivo
                complete: function(results) {
                    const lista = results.data;
                    const containerFilmes = document.getElementById("container-filmes");
                    const containerSeries = document.getElementById("container-series");
                    
                    containerFilmes.innerHTML = "";
                    containerSeries.innerHTML = "";

                    lista.forEach(item => {
                        if (!item.Nome || !item.Capa || !item.Tipo) return;
                        
                        const card = `
                            <div class="group cursor-pointer relative" onclick="abrirMidia('${encodeURIComponent(item.Nome)}', '${item.Tipo.toLowerCase()}')">
                                <div class="aspect-[2/3] w-full overflow-hidden rounded-xl bg-[#201f1f] mb-3 relative border border-zinc-800 shadow-md">
                                    <img src="${item.Capa}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="${item.Nome}" loading="lazy">
                                    <div class="absolute top-2 right-2 bg-gradient-to-r from-red-700 to-red-600 text-[9px] font-extrabold px-2 py-0.5 rounded-sm uppercase tracking-wider text-white shadow-sm">${item.Idioma || 'DUB'}</div>
                                </div>
                                <div class="space-y-0.5">
                                    <h3 class="font-semibold text-sm text-zinc-200 truncate group-hover:text-[#e50914] transition-colors">${item.Nome}</h3>
                                    <span class="text-xs text-zinc-500 block">${item.Categoria || ''}</span>
                                </div>
                            </div>
                        `;

                        if (item.Tipo.toLowerCase() === 'filme') {
                            containerFilmes.innerHTML += card;
                        } else if (item.Tipo.toLowerCase() === 'série' || item.Tipo.toLowerCase() === 'serie') {
                            containerSeries.innerHTML += card;
                        }
                    });
                }
            });
        }

        function abrirMidia(nome, tipo) {
            window.location.href = `../player/index.html?nome=${nome}&tipo=${tipo}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '../login/index.html';
        }
    </script>
</body>
</html>
