<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

video{
width:100%;
height:100%;
background:black;
object-fit:contain;
}

</style>

</head>

<body>

<video
id="v"
controls
autoplay
playsinline>
</video>

<script>

const url =
decodeURIComponent(
new URLSearchParams(location.search)
.get("url") || ""
);

const video =
document.getElementById("v");

video.src = url;

video.play().catch(err=>{

console.log(err);

});

</script>

</body>

</html>
