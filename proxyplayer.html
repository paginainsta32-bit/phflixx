<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

html,body{
margin:0;
padding:0;
background:black;
width:100%;
height:100%;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

</style>

</head>

<body>

<video
id="v"
controls
autoplay
playsinline>
</video>

<script>

const url =
decodeURIComponent(
new URLSearchParams(location.search)
.get("url")
);

const v =
document.getElementById("v");

v.src = url;

v.play().catch(err=>{

console.log(err);

});

</script>

</body>
</html>
